<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gran Rifa de $1.000.000</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f7fb;
            padding:30px;
        }

        .container{
            max-width:900px;
            margin:auto;
        }

        .card{
            background:white;
            border-radius:18px;
            padding:30px;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
        }

        h1{
            color:#118c4f;
            text-align:center;
            margin-bottom:10px;
        }

        .subtitulo{
            text-align:center;
            color:#666;
            margin-bottom:25px;
        }

        .info{
            display:flex;
            justify-content:space-around;
            flex-wrap:wrap;
            gap:15px;
            margin-bottom:30px;
        }

        .dato{
            background:#f2f2f2;
            padding:15px 25px;
            border-radius:12px;
            text-align:center;
        }

        .dato strong{
            display:block;
            color:#118c4f;
            font-size:22px;
            margin-top:5px;
        }

        h2{
            margin-bottom:15px;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(10,1fr);
            gap:10px;
        }

        .numero{
            background:#18b45b;
            color:white;
            border-radius:10px;
            padding:15px;
            text-align:center;
            cursor:pointer;
            font-weight:bold;
            transition:.2s;
        }
.vendido{
    background:#d63031 !important;
    cursor:not-allowed;
}
        .numero:hover{
            transform:scale(1.08);
        }

        @media(max-width:700px){

            .grid{
                grid-template-columns:repeat(5,1fr);
            }

            body{
                padding:15px;
            }

        }

    </style>

</head>
<body>

<div class="container">

<div class="card">

<h1>🎉 Gran Rifa de $1.000.000</h1>

<p class="subtitulo">
¡Participa por un premio de <b>$1.000.000 COP</b>!
</p>

<div class="info">

<div class="dato">
Premio
<strong>$1.000.000</strong>
</div>

<div class="dato">
Boleta
<strong>$20.000</strong>
</div>

<div class="dato">
Disponibles
<strong id="disponibles">100</strong>
</div>

</div>

<h2>Selecciona tu número</h2>

<div class="grid" id="grid"></div>

</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxL1hv4HLK--AWjPfDH5rfuTo4mWVYqbYT0XitBOcp9_CLto1EZ8IVcmH-yTygkPQsG9w/exec";

const grid = document.getElementById("grid");

async function cargarNumeros() {
    const respuesta = await fetch(API);
    const datos = await respuesta.json();

    grid.innerHTML = "";

    let disponibles = 0;

    datos.forEach(item => {
        if (item.estado === "Disponible") disponibles++;

        const clase = item.estado === "Vendido" ? "numero vendido" : "numero";

        grid.innerHTML += `
            <div class="${clase}">
                ${String(item.numero).padStart(2, "0")}
            </div>
        `;
    });

    document.getElementById("disponibles").textContent = disponibles;
}

cargarNumeros();

</script>

</body>
</html>
