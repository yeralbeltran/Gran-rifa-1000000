<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gran Rifa de $1.000.000</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f7fb;
            padding:30px;
        }

        .container{
            max-width:900px;
            margin:auto;
        }

        .card{
            background:white;
            border-radius:18px;
            padding:30px;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
        }

        h1{
            color:#118c4f;
            text-align:center;
            margin-bottom:10px;
        }

        .subtitulo{
            text-align:center;
            color:#666;
            margin-bottom:25px;
        }

        .info{
            display:flex;
            justify-content:space-around;
            flex-wrap:wrap;
            gap:15px;
            margin-bottom:30px;
        }

        .dato{
            background:#f2f2f2;
            padding:15px 25px;
            border-radius:12px;
            text-align:center;
        }

        .dato strong{
            display:block;
            color:#118c4f;
            font-size:22px;
            margin-top:5px;
        }

        h2{
            margin-bottom:15px;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(10,1fr);
            gap:10px;
        }

        .numero{
            background:#18b45b;
            color:white;
            border-radius:10px;
            padding:15px;
            text-align:center;
            cursor:pointer;
            font-weight:bold;
            transition:.2s;
        }
.vendido{
    background:#d63031 !important;
    cursor:not-allowed;
}
        .reservado {
    background:#f39c12 !important;
    cursor:not-allowed;
}
        .numero:hover{
            transform:scale(1.08);
        }

        @media(max-width:700px){

            .grid{
                grid-template-columns:repeat(5,1fr);
            }

            body{
                padding:15px;
            }

        }

    </style>

</head>
<body>

<div class="container">

<div class="card">

<h1>🎉 Gran Rifa de $1.000.000</h1>

<p class="subtitulo">
¡Participa por un premio de <b>$1.000.000 COP</b>!
</p>

<div class="info">

<div class="dato">
Premio
<strong>$1.000.000</strong>
</div>

<div class="dato">
Boleta
<strong>$20.000</strong>
</div>

<div class="dato">
Disponibles
<strong id="disponibles">100</strong>
</div>

</div>

<h2>Selecciona tu número</h2>

<div class="grid" id="grid"></div>

</div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyWAXtO39188YzuX_Da6LFo58cccdVTB1UmpFlDJMIXSmFirfywbNDupPGfx7CrW6nuBg/exec";
const grid = document.getElementById("grid");

async function cargarNumeros() {
    const respuesta = await fetch(API);
    const datos = await respuesta.json();

    grid.innerHTML = "";
    let disponibles = 0;

    datos.forEach(item => {
        const estado = item.estado.trim();
        const vendido = estado === "Vendido";
        const reservado = estado === "Reservado";
        if (!vendido && !reservado) disponibles++;

        const div = document.createElement("div");
        if (vendido) div.className = "numero vendido";
        else if (reservado) div.className = "numero reservado";
        else div.className = "numero";

        div.textContent = String(item.numero).padStart(2, "0");

        if (!vendido && !reservado) {
            div.addEventListener("click", async function() {
                if (this.classList.contains("vendido") || this.classList.contains("reservado")) return;

                const numero = this.textContent.trim();

                // Marcar como Reservado en Google Sheets usando GET
                await fetch(`${API}?accion=reservar&numero=${encodeURIComponent(numero)}&estado=Reservado`);

                // Actualizar visualmente
                this.classList.add("reservado");
                const disp = document.getElementById("disponibles");
                disp.textContent = parseInt(disp.textContent) - 1;

                // Abrir WhatsApp
                const mensaje = `Hola! Quiero apartar el número *${numero}* de la rifa de $1.000.000 💚`;
                const url = `https://wa.me/573112777740?text=${encodeURIComponent(mensaje)}`;
                window.open(url, "_blank");
            });
        }

        grid.appendChild(div);
    });

    document.getElementById("disponibles").textContent = disponibles;
}

cargarNumeros();
</script>
</body>
</html>
